<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#5b3fc2">
  <title>The Watcher</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="The Watcher">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    // ใช้ธีมที่บันทึกไว้ทันที ลดอาการกระพริบ
    try { if (localStorage.getItem('tw_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
</head>
<body>

  <!-- เข้าสู่ระบบ -->
  <div id="login">
    <div class="brandmark"><i class="bi bi-capsule-pill"></i></div>
    <h1>The Watcher</h1>
    <p class="login-sub">ระบบแจ้งเตือนวันหมดอายุของยา</p>
    <div class="login-card card-soft">
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="liUser" autocomplete="username" placeholder="ชื่อผู้ใช้">
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>รหัสผ่าน</label>
        <input type="password" id="liPass" autocomplete="current-password" placeholder="รหัสผ่าน">
      </div>
      <div class="err" id="liErr"></div>
      <button class="btn-brand" id="liBtn" style="margin-top:8px">เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- แอปหลัก -->
  <div id="main" class="d-none">
    <header id="appHeader">
      <div class="logo-box" id="hLogo"><i class="bi bi-capsule-pill"></i></div>
      <div style="flex:1;min-width:0">
        <div class="h-title" id="hTitle">The Watcher</div>
        <div class="h-sub">ระบบแจ้งเตือนวันหมดอายุของยา</div>
      </div>
      <button class="h-settings" id="hSettings" data-tab="settings" aria-label="ตั้งค่า">
        <i class="bi bi-gear-fill"></i>
      </button>
    </header>

    <main id="view"></main>

    <nav id="bottomNav">
      <button class="nav-btn" data-tab="home"><i class="bi bi-house-door-fill"></i><span>หน้าหลัก</span></button>
      <button class="nav-btn" data-tab="locations"><i class="bi bi-geo-alt-fill"></i><span>ยาแต่ละจุด</span></button>
      <div class="fab-wrap">
        <button class="fab nav-btn" data-tab="receive"><i class="bi bi-upc-scan"></i></button>
        <span class="fab-label">รับเข้า</span>
      </div>
      <button class="nav-btn" data-tab="issue"><i class="bi bi-box-arrow-right"></i><span>ใบเบิก</span></button>
      <button class="nav-btn" data-tab="exchange"><i class="bi bi-arrow-left-right"></i><span>แลกยา</span></button>
      <button class="nav-btn nav-settings-desk" data-tab="settings"><i class="bi bi-gear-fill"></i><span>ตั้งค่า</span></button>
    </nav>
  </div>

  <div class="toast-host" id="toastHost"></div>

  <div id="loadingOverlay">
    <div class="lo-card">
      <span class="spin spin-brand" style="width:30px;height:30px;border-width:3px"></span>
      <span class="lo-text">กำลังโหลด</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/manage.js"></script>
  <script src="js/receive.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/stock.js"></script>
  <script src="js/exchange.js"></script>
  <script src="js/issue.js"></script>
  <script src="js/export.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/core.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
